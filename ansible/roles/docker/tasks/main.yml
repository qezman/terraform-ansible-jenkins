# Installs Docker on the app server

# Install packages apt needs to use HTTPS repos
- name: Install apt dependencies for Docker
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: yes

- name: Start and enable Docker service
  service:
    name: docker
    state: started
    enabled: yes

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

# simple nginx container to test
- name: Pull nginx Docker image
  command: docker pull nginx:latest
  changed_when: true

- name: Run nginx container
  command: >
    docker run -d
    --name app
    --restart unless-stopped
    -p 80:80
    nginx:latest
  args:
    creates: /var/lib/docker/containers # skip if already running
  ignore_errors: true
